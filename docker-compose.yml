services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=training.settings
      - ALLOWED_HOSTS=*
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: sh -c "python manage.py migrate --noinput && gunicorn training.wsgi:application --bind 0.0.0.0:8000"

  monitor:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      - web
    environment:
      - CHECK_URL=http://web:8000/
      - CHECK_INTERVAL_SECONDS=30
      - REQUEST_TIMEOUT_SECONDS=5
      - MONITORED_SERVICE_NAME=web
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - .:/app:ro
    working_dir: /app
    command: python scripts/telegram_health_notifier.py
