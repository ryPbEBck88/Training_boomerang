{% load static %}
<div class="fuse-timer" id="{{ prefix }}-fuse-timer" role="timer" aria-label="Осталось времени">
	<div class="fuse-timer-track">
		<div class="fuse-timer-burn" id="{{ prefix }}-fuse-fill">
			<span class="fuse-timer-flame" aria-hidden="true">
				<span class="fuse-timer-spark" style="--dx: 0; --dy: -42; --delay: 0s; --dur: 0.6s"></span>
				<span class="fuse-timer-spark" style="--dx: 30; --dy: -30; --delay: 0.05s; --dur: 0.8s"></span>
				<span class="fuse-timer-spark" style="--dx: 42; --dy: 0; --delay: 0.1s; --dur: 0.55s"></span>
				<span class="fuse-timer-spark" style="--dx: 30; --dy: 30; --delay: 0.15s; --dur: 0.75s"></span>
				<span class="fuse-timer-spark" style="--dx: 0; --dy: 42; --delay: 0.08s; --dur: 0.65s"></span>
				<span class="fuse-timer-spark" style="--dx: -30; --dy: 30; --delay: 0.12s; --dur: 0.7s"></span>
				<span class="fuse-timer-spark" style="--dx: -42; --dy: 0; --delay: 0.03s; --dur: 0.5s"></span>
				<span class="fuse-timer-spark" style="--dx: -30; --dy: -30; --delay: 0.18s; --dur: 0.85s"></span>
				<span class="fuse-timer-spark" style="--dx: 22; --dy: -36; --delay: 0.06s; --dur: 0.6s"></span>
				<span class="fuse-timer-spark" style="--dx: 36; --dy: 22; --delay: 0.11s; --dur: 0.72s"></span>
				<span class="fuse-timer-spark" style="--dx: -36; --dy: 22; --delay: 0.04s; --dur: 0.58s"></span>
				<span class="fuse-timer-spark" style="--dx: -22; --dy: -36; --delay: 0.14s; --dur: 0.78s"></span>
			</span>
		</div>
	</div>
</div>
