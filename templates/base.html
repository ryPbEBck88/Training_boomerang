{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}Тренажёр крупье{% endblock %}</title>
	<link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
	<link rel="stylesheet" href="{% static 'common/style.css' %}">
</head>
<body>
	<header>
		<nav>
			<a href="{% url 'homepage_index' %}" class="nav-home" title="Главная"><img src="{% static 'images/favicon.png' %}" alt="" width="28" height="28"></a>
			<a href="{% url 'blackjack_index' %}">Black Jack</a>
			<a href="{% url 'poker_index' %}">Poker</a>
			<a href="{% url 'ar_index' %}">AR</a>
		</nav>
	</header>
	<main class="{% block main_class %}{% endblock %}">
		<div class="main-card">
			{% block content %}{% endblock %}
		</div>
	</main>
</body>
</html>
