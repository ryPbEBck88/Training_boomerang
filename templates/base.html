{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}Тренажёры крупье{% endblock %}</title>
	<meta name="description" content="{% block meta_description %}Я крупье — обучение крупье, тренажёры BJ, Poker (Oasis, Texas Hold'em), рулетка, AR заставки для практики выплат и комбинаций.{% endblock %}">
	<meta name="keywords" content="{% block meta_keywords %}я крупье, обучение крупье, тренажёр крупье, black jack, покер, oasis poker, texas holdem, выплаты, комбинации, рулетка, AR{% endblock %}">
	<link rel="canonical" href="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
	<link rel="icon" type="image/png" sizes="48x48" href="{{ request.scheme }}://{{ request.get_host }}{% static 'images/favicon-48.png' %}">
	<link rel="icon" type="image/png" sizes="96x96" href="{{ request.scheme }}://{{ request.get_host }}{% static 'images/favicon-96.png' %}">
	<link rel="shortcut icon" href="{{ request.scheme }}://{{ request.get_host }}{% static 'images/favicon-48.png' %}">
	<link rel="stylesheet" href="{% static 'common/style.css' %}">
	{% block extra_head %}{% endblock %}
	<meta property="og:type" content="website">
	<meta property="og:locale" content="ru_RU">
	<meta property="og:title" content="{% block og_title %}Тренажёры крупье{% endblock %}">
	<meta property="og:description" content="{% block og_description %}Я крупье — обучение крупье, тренажёры BJ, Poker, рулетка, AR заставки.{% endblock %}">
	<meta property="og:url" content="{{ request.scheme }}://{{ request.get_host }}{{ request.path }}">
	<meta property="og:image" content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/favicon.png' %}">
	<meta property="og:site_name" content="Тренажёры крупье">
	<meta name="twitter:card" content="summary">
	<meta name="twitter:title" content="{% block twitter_title %}Тренажёры крупье{% endblock %}">
	<meta name="twitter:description" content="{% block twitter_description %}Я крупье — обучение крупье, тренажёры BJ, Poker, рулетка, AR.{% endblock %}">
	<script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"Тренажёры крупье","url":"{{ request.scheme }}://{{ request.get_host }}/","description":"Я крупье — обучение крупье, тренажёры BJ, Poker (Oasis, Texas Hold'em), рулетка, AR заставки для практики выплат и комбинаций","inLanguage":"ru"}</script>
</head>
<body>
	<header>
		<nav>
			<a href="{% url 'homepage_index' %}" class="nav-home" title="Главная"><img src="{% static 'images/favicon.png' %}" alt="" width="28" height="28"></a>
			<a href="{% url 'blackjack_index' %}">BJ</a>
			<a href="{% url 'poker_index' %}">Poker</a>
			<a href="{% url 'ar_index' %}">AR</a>
		</nav>
	</header>
	<main class="{% block main_class %}{% endblock %}">
		<div class="main-card">
			{% block content %}{% endblock %}
		</div>
	</main>
	<button type="button" class="back-to-top" id="back-to-top" title="В начало страницы" aria-label="В начало страницы">↑</button>
	<script src="{% static 'common/payout-keyboard.js' %}"></script>
	<script src="{% static 'common/fuse_timer.js' %}"></script>
	<script>
	(function() {
		var btn = document.getElementById('back-to-top');
		if (!btn) return;
		function toggle() { btn.classList.toggle('visible', window.scrollY > 100); }
		window.addEventListener('scroll', toggle, { passive: true });
		toggle();
		btn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
	})();
	</script>
	{% block extra_scripts %}{% endblock %}
</body>
</html>
