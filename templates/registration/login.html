{% extends "base.html" %}
{% block title %}Вход — Тренажёры крупье{% endblock %}
{% block content %}
<h1>Вход</h1>
<form method="post" action="{% url 'login' %}">
	{% csrf_token %}
	{% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
	<p>
		<label for="id_username">Логин:</label>
		<input type="text" name="username" id="id_username" required autocomplete="username" value="{{ form.username.value|default:'' }}">
	</p>
	<p>
		<label for="id_password">Пароль:</label>
		<input type="password" name="password" id="id_password" required autocomplete="current-password">
	</p>
	{% if form.non_field_errors %}
	<ul class="errorlist">{{ form.non_field_errors }}</ul>
	{% endif %}
	<button type="submit" class="btn btn-primary">Войти</button>
</form>
<p><a href="{% url 'register' %}">Регистрация</a></p>
{% endblock %}
