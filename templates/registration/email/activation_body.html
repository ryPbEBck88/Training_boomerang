<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;font-family:Segoe UI,system-ui,sans-serif;background:#f0f7ff;color:#1e293b;line-height:1.5;">
	<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="padding:24px 16px;">
		<tr>
			<td align="center">
				<table role="presentation" width="100%" style="max-width:480px;background:#fff;border-radius:12px;border:1px solid #cbd5e1;overflow:hidden;box-shadow:0 4px 20px rgba(30,58,95,0.08);">
					<tr>
						<td style="height:4px;background:linear-gradient(90deg,#1e3a5f,#2563eb,#0d9488);"></td>
					</tr>
					<tr>
						<td style="padding:28px 24px 24px;">
							<p style="margin:0 0 12px;font-size:16px;">Здравствуйте, <strong>{{ user.username }}</strong>.</p>
							<p style="margin:0 0 20px;font-size:15px;color:#475569;">Подтвердите регистрацию на сайте «Тренажёры крупье»:</p>
							<p style="margin:0 0 24px;text-align:center;">
								<a href="{{ activation_link }}" style="display:inline-block;padding:12px 24px;background:#2563eb;color:#fff;text-decoration:none;font-weight:700;border-radius:8px;font-size:15px;">Подтвердить почту</a>
							</p>
							<p style="margin:0;font-size:13px;color:#64748b;word-break:break-all;">Если кнопка не открывается, скопируйте ссылку:<br><a href="{{ activation_link }}" style="color:#2563eb;">{{ activation_link }}</a></p>
							<p style="margin:20px 0 0;font-size:12px;color:#94a3b8;">Если вы не регистрировались, проигнорируйте это письмо.</p>
						</td>
					</tr>
				</table>
			</td>
		</tr>
	</table>
</body>
</html>
