<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const canvas = document.getElementById('ar-canvas');
if (!canvas) throw new Error('canvas not found');

function setCookie(name, value, days) {
	const maxAge = days ? days * 24 * 60 * 60 : 31536000;
	document.cookie = name + '=' + encodeURIComponent(value) + '; Path=/; Max-Age=' + maxAge;
}
function getCookie(name) {
	const prefix = name + '=';
	const parts = document.cookie.split(';');
	for (let i = 0; i < parts.length; i++) {
		const part = parts[i].trim();
		if (part.indexOf(prefix) === 0) return decodeURIComponent(part.substring(prefix.length));
	}
	return null;
}

let arMinChips = 0;
let arMaxChips = 5;
let arUseStacks = true;
let arStacksCount = 1;
let arSelectedNumber = 5;
try {
	const stored = getCookie('ar_chips_range') || localStorage.getItem('ar_chips_range');
	if (stored) {
		const p = JSON.parse(stored);
		const vmin = parseInt(p.min, 10);
		const vmax = parseInt(p.max, 10);
		if (!isNaN(vmin)) arMinChips = Math.max(0, Math.min(10, vmin));
		if (!isNaN(vmax)) arMaxChips = Math.max(0, Math.min(10, vmax));
	}
	const stacksStored = getCookie('ar_stacks_mode') || localStorage.getItem('ar_stacks_mode');
	if (stacksStored) {
		const q = JSON.parse(stacksStored);
		arUseStacks = !!q.enabled;
		const sc = parseInt(q.stacks, 10);
		if (!isNaN(sc) && sc >= 1 && sc <= 3) arStacksCount = sc;
	}
	const numberStored = getCookie('ar_number_select');
	if (numberStored) {
		const n = parseInt(numberStored, 10);
		if (n === 0 || n === 2 || n === 5) arSelectedNumber = n;
	}
} catch (_) {}

var containerW = canvas.parentElement.clientWidth || 480;
var containerH = canvas.parentElement.clientHeight || Math.min(640, Math.floor(containerW * 0.75));
if (containerW < 100) containerW = 640;
if (containerH < 100) containerH = 360;
var w = containerW;
var h = containerH;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);

const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 1000);
camera.position.set(12.095, 2.566, 18.105);
camera.lookAt(12.281, 17.126, 1.613);

const controls = new OrbitControls(camera, canvas);
controls.target.set(12.281, 17.126, 1.613);
const cameraHomePos = { x: 12.095, y: 2.566, z: 18.105 };
const cameraHomeTarget = { x: 12.281, y: 17.126, z: 1.613 };
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.95;
controls.minAzimuthAngle = -Math.PI / 2;
controls.maxAzimuthAngle = Math.PI / 2;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(w, h);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(20, 25, 20);
scene.add(dir);

const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const whiteStripMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); /* полоски — всегда белые */
const blueMat = new THREE.MeshStandardMaterial({ color: 0x2563eb });
const cellW = 8, cellH = 10;
const gap = 0.3;
const edge = 0.15;
const cornerScale = 0.3;

function makeNumberTexture(num, color) {
	const size = 768;
	const canvas = document.createElement('canvas');
	canvas.width = size;
	canvas.height = size;
	const ctx = canvas.getContext('2d');
	ctx.fillStyle = color || '#ffffff';
	ctx.font = 'bold 576px sans-serif';
	ctx.textAlign = 'center';
	ctx.textBaseline = 'middle';
	ctx.fillText(String(num), size / 2, size / 2);
	const tex = new THREE.CanvasTexture(canvas);
	tex.needsUpdate = true;
	return tex;
}

function makeTextTexture(text, color) {
	const width = 1024;
	const height = 256;
	const canvas = document.createElement('canvas');
	canvas.width = width;
	canvas.height = height;
	const ctx = canvas.getContext('2d');
	ctx.fillStyle = color || '#ffffff';
	ctx.font = 'bold 180px sans-serif';
	ctx.textAlign = 'center';
	ctx.textBaseline = 'middle';
	ctx.fillText(String(text), width / 2, height / 2);
	const tex = new THREE.CanvasTexture(canvas);
	tex.needsUpdate = true;
	return tex;
}

var labelNumbers = [1, 4, 7, 10, 2, 5, 8, 11, 3, 6, 9, 12];

function addCell(cx, cy, cellIndex) {
	const number5 = new THREE.Mesh(new THREE.PlaneGeometry(cellW, cellH), blueMat);
	number5.name = 'number 5';
	number5.position.set(cx, cy, 0);
	scene.add(number5);

	const num = labelNumbers[cellIndex];
	const isRed = [1, 3, 5, 7, 9, 12].indexOf(num) !== -1;
	const labelColor = isRed ? '#c00' : '#000';
	const labelPlane = new THREE.Mesh(
		new THREE.PlaneGeometry(7.2, 7.2),
		new THREE.MeshBasicMaterial({
			map: makeNumberTexture(num, labelColor),
			transparent: true,
			side: THREE.DoubleSide
		})
	);
	labelPlane.position.set(cx, cy, 0.02);
	labelPlane.rotation.z = Math.PI / 2;
	labelPlane.name = 'label ' + num;
	scene.add(labelPlane);
}

const cx0 = cellW / 2, cx1 = cellW + gap + cellW / 2, cx2 = cellW + gap + cellW + gap + cellW / 2, cx3 = cellW + gap + cellW + gap + cellW + gap + cellW / 2;
const cy0 = cellH / 2, cy1 = cellH + gap + cellH / 2, cy2 = cellH + gap + cellH + gap + cellH / 2;
const centers = [
	[cx0, cy0], [cx1, cy0], [cx2, cy0], [cx3, cy0],
	[cx0, cy1], [cx1, cy1], [cx2, cy1], [cx3, cy1],
	[cx0, cy2], [cx1, cy2], [cx2, cy2], [cx3, cy2]
];
centers.forEach(function (c, i) { addCell(c[0], c[1], i); });

const centerCell = [cx1, cy1];
const halfW = cellW / 2, halfH = cellH / 2;
const splitCenter = gap / 2;
const axesCenter = new THREE.AxesHelper(2);
axesCenter.position.set(centerCell[0], centerCell[1], 0.1);
axesCenter.visible = false;
scene.add(axesCenter);

const axesLeft = new THREE.AxesHelper(1.2);
axesLeft.position.set(cx1 - halfW - splitCenter, cy1, 0.1);
axesLeft.visible = false;
scene.add(axesLeft);
const axesRight = new THREE.AxesHelper(1.2);
axesRight.position.set(cx1 + halfW + splitCenter, cy1, 0.1);
axesRight.visible = false;
scene.add(axesRight);
const axesTop = new THREE.AxesHelper(1.2);
axesTop.position.set(cx1, cy1 + halfH + splitCenter, 0.1);
axesTop.visible = false;
scene.add(axesTop);
const axesBottom = new THREE.AxesHelper(1.2);
axesBottom.position.set(cx1, cy1 - halfH - splitCenter, 0.1);
axesBottom.visible = false;
scene.add(axesBottom);

const cornerTL = new THREE.AxesHelper(1.2);
cornerTL.position.set(cx1 - halfW - splitCenter, cy1 + halfH + splitCenter, 0.1);
cornerTL.visible = false;
scene.add(cornerTL);
const cornerTR = new THREE.AxesHelper(1.2);
cornerTR.position.set(cx1 + halfW + splitCenter, cy1 + halfH + splitCenter, 0.1);
cornerTR.visible = false;
scene.add(cornerTR);
const cornerBL = new THREE.AxesHelper(1.2);
cornerBL.position.set(cx1 - halfW - splitCenter, cy1 - halfH - splitCenter, 0.1);
cornerBL.visible = false;
scene.add(cornerBL);
const cornerBR = new THREE.AxesHelper(1.2);
cornerBR.position.set(cx1 + halfW + splitCenter, cy1 - halfH - splitCenter, 0.1);
cornerBR.visible = false;
scene.add(cornerBR);

const axisAbove8 = new THREE.AxesHelper(1.2);
axisAbove8.position.set(cx1, cy2 + halfH + splitCenter, 0.1);
axisAbove8.visible = false;
scene.add(axisAbove8);
const axisAbove8Left = new THREE.AxesHelper(1.2);
axisAbove8Left.position.set(cx1 - halfW - splitCenter, cy2 + halfH + splitCenter, 0.1);
axisAbove8Left.visible = false;
scene.add(axisAbove8Left);
const axisAbove8Right = new THREE.AxesHelper(1.2);
axisAbove8Right.position.set(cx1 + halfW + splitCenter, cy2 + halfH + splitCenter, 0.1);
axisAbove8Right.visible = false;
scene.add(axisAbove8Right);

const gridLeft = -edge;
const gridRight = cellW + gap + cellW + gap + cellW + gap + cellW + edge;
const gridBottom = -edge;
const gridTop = cellH + gap + cellH + gap + cellH + edge;
const vertLineH = gridTop - gridBottom;
const horzLineW = gridRight - gridLeft;

const vertX = [
	gridLeft,
	cellW + gap / 2,
	cellW + gap + cellW + gap / 2,
	cellW + gap + cellW + gap + cellW + gap / 2,
	gridRight
];
vertX.forEach(function (x) {
	const line = new THREE.Mesh(new THREE.PlaneGeometry(gap, vertLineH), whiteStripMat);
	line.name = 'split';
	line.position.set(x, (gridTop + gridBottom) / 2, 0);
	scene.add(line);
});

const horzY = [gridBottom, cellH + gap / 2, cellH + gap + cellH + gap / 2, gridTop];
horzY.forEach(function (y) {
	const line = new THREE.Mesh(new THREE.PlaneGeometry(horzLineW, gap), whiteStripMat);
	line.name = 'split';
	line.position.set((gridLeft + gridRight) / 2, y, 0);
	scene.add(line);
});

function addGrayStrip(x1, y1, x2, y2, thickness) {
	const dx = x2 - x1;
	const dy = y2 - y1;
	const length = Math.hypot(dx, dy);
	const strip = new THREE.Mesh(new THREE.PlaneGeometry(length, thickness), whiteStripMat);
	strip.name = 'white-strip';
	strip.position.set((x1 + x2) / 2, (y1 + y2) / 2, 0);
	strip.rotation.z = Math.atan2(dy, dx);
	scene.add(strip);
}
addGrayStrip(-0.15, -0.15, -3.15, -0.15, gap);   /* горизонталь снизу: (-0.15,-0.15) → (-3.15,-0.15) */
addGrayStrip(-3.15, -0.15, -8.15, 10.15, gap);   /* диагональ снизу от (-3.15,-0.15) к вершине */
addGrayStrip(-0.15, 30.75, -3.15, 30.75, gap);   /* горизонталь: corner 0-1-2-3 → (-3.15, 30.75) */
addGrayStrip(-3.15, 30.75, -8.15, 20.75, gap);   /* диагональ от (-3.15, 30.75) к вершине трапеции */
addGrayStrip(-8.15, 10.15, -8.15, 20.75, gap);
const topRectBottom = gridTop + 0.3;  /* зазор 0.3 между полем 1-12 и 1st Dozen */

const trapezoidShape = new THREE.Shape();
trapezoidShape.moveTo(-0.15, -0.15);
trapezoidShape.lineTo(-3.15, -0.15);
trapezoidShape.lineTo(-8.15, 10.15);
trapezoidShape.lineTo(-8.15, 20.75);
trapezoidShape.lineTo(-3.15, 30.75);
trapezoidShape.lineTo(-0.15, 30.75);
trapezoidShape.closePath();
const trapezoid = new THREE.Mesh(new THREE.ShapeGeometry(trapezoidShape), blueMat);
trapezoid.name = 'blue-trapezoid';
trapezoid.position.set(0, 0, -0.01);
scene.add(trapezoid);

const dozRight = 33.05 - 0.15;
const topRectShape = new THREE.Shape();
topRectShape.moveTo(0, topRectBottom);
topRectShape.lineTo(dozRight, topRectBottom);
topRectShape.lineTo(dozRight, 36);
topRectShape.lineTo(0, 36);
topRectShape.closePath();
const topRect = new THREE.Mesh(new THREE.ShapeGeometry(topRectShape), blueMat);
topRect.name = 'blue-top-rect';
topRect.position.set(0, 0, -0.01);
scene.add(topRect);

/* Белая рамка 1st Dozen — низ не опускается в зазор, чтобы оставался gap 0.3 */
const topRectBorderThickness = gap;
const dozOut = new THREE.Shape();
dozOut.moveTo(-0.3, topRectBottom);
dozOut.lineTo(dozRight + topRectBorderThickness, topRectBottom);
dozOut.lineTo(dozRight + topRectBorderThickness, 36 + topRectBorderThickness);
dozOut.lineTo(-0.3, 36 + topRectBorderThickness);
dozOut.closePath();
const dozHole = new THREE.Path();
dozHole.moveTo(-0.3 + topRectBorderThickness, topRectBottom + topRectBorderThickness);
dozHole.lineTo(dozRight, topRectBottom + topRectBorderThickness);
dozHole.lineTo(dozRight, 36);
dozHole.lineTo(-0.3 + topRectBorderThickness, 36);
dozHole.closePath();
dozOut.holes.push(dozHole);
const topRectBorder = new THREE.Mesh(new THREE.ShapeGeometry(dozOut), whiteStripMat);
topRectBorder.position.set(0, 0, 0.001);
topRectBorder.name = 'top-rect-border';
scene.add(topRectBorder);

const dozenLabel = new THREE.Mesh(
	new THREE.PlaneGeometry(12, 5),
	new THREE.MeshBasicMaterial({
		map: makeTextTexture('1st Dozen', '#000000'),
		transparent: true,
		side: THREE.DoubleSide
	})
);
dozenLabel.position.set(16.45, (topRectBottom + 36) / 2, 0.02);
dozenLabel.rotation.z = 0;
dozenLabel.name = 'label 1st Dozen';
scene.add(dozenLabel);

const zeroLabel = new THREE.Mesh(
	new THREE.PlaneGeometry(7.2, 7.2),
	new THREE.MeshBasicMaterial({
		map: makeNumberTexture(0, '#16a34a'),
		transparent: true,
		side: THREE.DoubleSide
	})
);
zeroLabel.position.set(-4.15, 15.3, 0.02);
zeroLabel.rotation.z = Math.PI / 2;
zeroLabel.name = 'label 0';
scene.add(zeroLabel);


vertX.forEach(function (x) {
	horzY.forEach(function (y) {
		const corner = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), whiteStripMat);
		corner.name = 'corner';
		corner.position.set(x, y, 0);
		corner.scale.set(cornerScale, cornerScale, 1);
		scene.add(corner);
	});
});

const spawnZ = 0.175;
const chipStep = 0.35;
const spawnZ2 = spawnZ + chipStep;
const spawnZ3 = spawnZ + chipStep * 2;
const spawnZ4 = spawnZ + chipStep * 3;
const spawnZ5 = spawnZ + chipStep * 4;
const spawnZ6 = spawnZ + chipStep * 5;
const spawnZ7 = spawnZ + chipStep * 6;
const spawnZ8 = spawnZ + chipStep * 7;
const spawnZ9 = spawnZ + chipStep * 8;
const spawnZ10 = spawnZ + chipStep * 9;
const firstLadderOffset = 0.6; /* стопка -> первая фишка лесенки */
const ladderStep = 0.3;       /* шаг между фишками лесенки */
const zeroCenter = { x: -4.15, y: 15.3 };
const zeroSplitX = -0.15;
const zeroCornerX = -0.15;
const zeroTrioX = -0.15;
const zeroTrioY01 = horzY[1];
const zeroTrioY12 = horzY[2];
const twoCenter = { x: cx0, y: cy1 };
const twoSplitY01 = horzY[1];
const twoSplitY12 = horzY[2];
const twoStreetY = cy2 + halfH + splitCenter;
const twoSplitX = vertX[1];
const twoCornerY01 = horzY[1];
const twoCornerY12 = horzY[2];
const spawnPoints = [
	[centerCell[0], centerCell[1]],
	[cx1 - halfW - splitCenter, cy1],
	[cx1 + halfW + splitCenter, cy1],
	[cx1, cy1 + halfH + splitCenter],
	[cx1, cy1 - halfH - splitCenter],
	[cx1 - halfW - splitCenter, cy1 + halfH + splitCenter],
	[cx1 + halfW + splitCenter, cy1 + halfH + splitCenter],
	[cx1 - halfW - splitCenter, cy1 - halfH - splitCenter],

	[zeroSplitX, cy2],                      /* split 0-3 */
	[zeroTrioX, zeroTrioY01],               /* trio 0-1-2 */
	[zeroTrioX, zeroTrioY12],               /* trio 0-2-3 */
	[zeroCornerX, horzY[3]],                /* corner 0-1-2-3 */
	[twoCenter.x, twoCenter.y],             /* 2 straight */
	[twoCenter.x, twoSplitY01],             /* split 1-2 */
	[twoCenter.x, twoSplitY12],             /* split 2-3 */
	[twoCenter.x, twoStreetY],              /* street 1-3 */
	[twoSplitX, twoCornerY01],              /* corner 1-2-4-5 */
	[twoSplitX, cy1],                       /* split 2-5 */
	[twoSplitX, twoCornerY12],              /* split 2-6 */
	[twoSplitX, horzY[3]]                   /* sixline 1-6 */
];

const spawnNameByIndex = [
	'5',
	'split 4-5',
	'split 5-6',
	'split 5-8',
	'split 2-5',
	'corner 4-5-7-8',
	'corner 5-6-8-9',
	'corner 1-2-4-5',
	'corner 2-3-5-6',
	'street 7-8-9',
	'sixline 4-9',
	'sixline 5-9',
	'0',
	'split 0-1',
	'split 0-2',
	'split 0-3',
	'street 0-1-2',

let correctAnswer = null;

function doSpawn() {
	focusCameraOnNumber();
	correctAnswer = null;
	var answerRow = document.querySelector('.ar-answer-row');
	var answerDisplay = document.getElementById('answer-display');
	if (answerRow) answerRow.style.display = 'flex';
	if (answerDisplay) answerDisplay.style.display = '';
	document.getElementById('answer-display').textContent = '';
	document.getElementById('user-answer').value = '';
	while (chipsGroup.children.length) {
		chipsGroup.remove(chipsGroup.children[0]);
	}
	const cylGeom = new THREE.CylinderGeometry(1.5, 1.5, 0.35, 32);
	const loader = new THREE.TextureLoader();
	const texUrl = window.CYLINDER_TEXTURE_URL || '';
	function addCylinder(material, x, y, z, rotZ) {
		if (rotZ !== undefined) {
			const group = new THREE.Group();
			group.position.set(x, y, z);
			group.rotation.z = rotZ;
			const cyl = new THREE.Mesh(cylGeom, material);
			cyl.rotation.x = -Math.PI / 2;
			group.add(cyl);
			chipsGroup.add(group);
		} else {
			const cyl = new THREE.Mesh(cylGeom, material);
			cyl.position.set(x, y, z);
			cyl.rotation.x = -Math.PI / 2;
			chipsGroup.add(cyl);
		}
	}
	function runSpawns(material) {
		const chipCounts = new Array(spawnPoints.length).fill(0);
		const idxForNumber = spawnIndicesByNumber[arSelectedNumber];
		const namesForNumber = spawnNamesByNumber[arSelectedNumber] || spawnNamesByNumber[5];
		const allowedSpawnIdx = idxForNumber
			? idxForNumber.slice()
			: Array.from(new Set(
				namesForNumber.flatMap(function (name) { return spawnIndicesByName[name] || []; })
			));
		if (arUseStacks) {
			let chips = 20 * arStacksCount;
			let available = allowedSpawnIdx.slice();
			while (chips > 0 && available.length > 0) {
				const idx = Math.floor(Math.random() * available.length);
				const spawnIdx = available[idx];
				chipCounts[spawnIdx] += 1;
				chips -= 1;
				if (chipCounts[spawnIdx] === 10) {
					available.splice(idx, 1);
				}
			}
		} else {
			const minChips = Math.min(arMinChips, arMaxChips);
			const maxChips = Math.max(arMinChips, arMaxChips);
			const range = maxChips - minChips + 1;
			for (let i = 0; i < spawnPoints.length; i++) {
				if (allowedSpawnIdx.indexOf(i) === -1) continue;
				const count = range > 0 ? minChips + Math.floor(Math.random() * range) : minChips;
				chipCounts[i] = count;
			}
		}
		for (let i = 0; i < spawnPoints.length; i++) {
			const count = chipCounts[i];
			if (count === 0) continue;
			const x = spawnPoints[i][0], y = spawnPoints[i][1];
			const firstStackColumn = count >= 5;
			const firstStackLadder = count >= 2 && count <= 4;
			addCylinder(material, x, y, spawnZ);
			if (count >= 2 && (firstStackColumn || firstStackLadder)) {
				if (firstStackColumn) addCylinder(material, x, y, spawnZ2);
				else addCylinder(material, x, y + ladderStep, spawnZ2, (Math.random() - 0.5) * 0.4);
			}
			if (count >= 3 && (firstStackColumn || firstStackLadder)) {
				if (firstStackColumn) addCylinder(material, x, y, spawnZ3);
				else addCylinder(material, x, y + ladderStep * 2, spawnZ3, (Math.random() - 0.5) * 0.4);
			}
			if (count >= 4 && (firstStackColumn || firstStackLadder)) {
				if (firstStackColumn) addCylinder(material, x, y, spawnZ4);
				else addCylinder(material, x, y + ladderStep * 3, spawnZ4, (Math.random() - 0.5) * 0.4);
			}
			if (count >= 5) addCylinder(material, x, y, spawnZ5);
			if (count >= 6 && count < 10) addCylinder(material, x, y + firstLadderOffset, spawnZ6, (Math.random() - 0.5) * 0.4);
			if (count >= 7 && count < 10) addCylinder(material, x, y + firstLadderOffset + ladderStep, spawnZ7, (Math.random() - 0.5) * 0.4);
			if (count >= 8 && count < 10) addCylinder(material, x, y + firstLadderOffset + ladderStep * 2, spawnZ8, (Math.random() - 0.5) * 0.4);
			if (count >= 9 && count < 10) addCylinder(material, x, y + firstLadderOffset + ladderStep * 3, spawnZ9, (Math.random() - 0.5) * 0.4);
			if (count === 10) {
				const zLevels = [spawnZ6, spawnZ7, spawnZ8, spawnZ9, spawnZ10];
				for (let k = 0; k < 5; k++) {
					addCylinder(material, x, y + firstLadderOffset, zLevels[k]);
				}
			}
		}
		const multipliers = new Array(spawnPoints.length).fill(0);
		const payoutsIdx = payoutsByNumberIndex[arSelectedNumber];
		if (payoutsIdx) {
			Object.keys(payoutsIdx).forEach(function (idx) {
				multipliers[parseInt(idx, 10)] = payoutsIdx[idx];
			});
		} else {
			const payouts = payoutsByNumber[arSelectedNumber] || payoutsByNumber[5];
			Object.keys(payouts).forEach(function (name) {
				const idxList = spawnIndicesByName[name] || [];
				idxList.forEach(function (idx) { multipliers[idx] = payouts[name]; });
			});
		}
		correctAnswer = 0;
		for (let i = 0; i < chipCounts.length; i++) {
			correctAnswer += chipCounts[i] * multipliers[i];
		}
		document.getElementById('answer-display').textContent = 'Введите ответ и нажмите ↵';
	}
	if (texUrl) {
		loader.load(texUrl, function (tex) {
			tex.colorSpace = THREE.SRGBColorSpace;
			/* настройки текстуры — можно менять: */
			tex.wrapS = tex.wrapT = THREE.RepeatWrapping;  /* или ClampToEdgeWrapping */
			tex.repeat.set(1, 0.96);   /* масштаб: 1 = как есть, <1 растягивает, >1 сжимает */
		tex.offset.set(0 , 1);  /* смещение в долях (0..1) */
			runSpawns(new THREE.MeshBasicMaterial({ map: tex }));
		}, undefined, function () {
			runSpawns(new THREE.MeshStandardMaterial({ color: 0xdc2626 }));
		});
	} else {
		runSpawns(new THREE.MeshStandardMaterial({ color: 0xdc2626 }));
	}
}
doSpawn();

function doCheck() {
	const el = document.getElementById('answer-display');
	const input = document.getElementById('user-answer');
	const userVal = input.value.trim() === '' ? NaN : parseInt(input.value, 10);
	if (correctAnswer === null) {
		el.textContent = 'Подождите загрузки фишек…';
		el.style.color = '';
		return;
	}
	if (!Number.isInteger(userVal) || userVal < 0) {
		el.textContent = 'Введите целое неотрицательное число.';
		el.style.color = '';
		return;
	}
	if (userVal === correctAnswer) {
		input.blur();
		var answerRow = document.querySelector('.ar-answer-row');
		var answerDisplay = document.getElementById('answer-display');
		if (answerRow) answerRow.style.display = 'none';
		if (answerDisplay) answerDisplay.style.display = 'none';
		document.getElementById('ar-success-overlay').style.display = 'flex';
		el.textContent = 'Верно!';
		el.style.color = 'green';
	} else {
		showErrorOverlay(false);
		el.textContent = '';
	}
}
function showErrorOverlay(isPass) {
	const hand = document.getElementById('ar-error-hand');
	const text = document.getElementById('ar-error-text');
	if (isPass && correctAnswer !== null) {
		hand.style.display = 'none';
		text.innerHTML = 'Пропущено.<br>Правильный ответ: ' + correctAnswer;
	} else {
		arErrorWasPass = false;
		hand.style.display = '';
		text.textContent = 'Стоп!';
	}
	document.getElementById('ar-error-overlay').style.display = 'flex';
}
document.getElementById('btn-check').addEventListener('click', doCheck);
var arErrorWasPass = false;
document.getElementById('btn-pass').addEventListener('click', function () {
	if (correctAnswer === null) {
		document.getElementById('answer-display').textContent = 'Подождите загрузки фишек…';
		return;
	}
	arErrorWasPass = true;
	showErrorOverlay(true);
});
document.getElementById('user-answer').addEventListener('keydown', function (e) {
	if (e.key === 'Enter') doCheck();
});
document.getElementById('ar-success-close').addEventListener('click', function () {
	if (window.AR_MIX_ROULETTE_URL && correctAnswer !== null) {
		window.location = window.AR_MIX_ROULETTE_URL + '?mode=mix&mix_number=' + correctAnswer;
		return;
	}
	document.getElementById('ar-success-overlay').style.display = 'none';
	doSpawn();
});
document.getElementById('ar-error-close').addEventListener('click', function () {
	document.getElementById('ar-error-overlay').style.display = 'none';
	if (arErrorWasPass) {
		arErrorWasPass = false;
		doSpawn();
	}
});

function updateStacksUI() {
	const useStacks = document.getElementById('ar-use-stacks').checked;
	const minEl = document.getElementById('ar-min-chips');
	const maxEl = document.getElementById('ar-max-chips');
	minEl.disabled = useStacks;
	maxEl.disabled = useStacks;
}
function loadArSettings() {
	document.getElementById('ar-min-chips').value = arMinChips;
	document.getElementById('ar-max-chips').value = arMaxChips;
	document.getElementById('ar-use-stacks').checked = arUseStacks;
	document.getElementById('ar-stacks-select').value = String(arStacksCount);
	document.getElementById('ar-number-select').value = String(arSelectedNumber);
	updateStacksUI();
}
function saveArSettings() {
	const minEl = document.getElementById('ar-min-chips');
	const maxEl = document.getElementById('ar-max-chips');
	const useStacks = document.getElementById('ar-use-stacks').checked;
	const stacksVal = document.getElementById('ar-stacks-select').value;
	const numberVal = document.getElementById('ar-number-select').value;
	arUseStacks = useStacks;
	arStacksCount = Math.max(1, Math.min(3, parseInt(stacksVal, 10) || 1));
	const parsedNumber = parseInt(numberVal, 10);
	arSelectedNumber = (parsedNumber === 0 || parsedNumber === 2 || parsedNumber === 5) ? parsedNumber : 5;
	if (minEl && maxEl && !useStacks) {
		arMinChips = Math.max(0, Math.min(10, parseInt(minEl.value, 10) || 0));
		arMaxChips = Math.max(0, Math.min(10, parseInt(maxEl.value, 10) || 0));
		localStorage.setItem('ar_chips_range', JSON.stringify({ min: arMinChips, max: arMaxChips }));
		setCookie('ar_chips_range', JSON.stringify({ min: arMinChips, max: arMaxChips }), 365);
	}
	localStorage.setItem('ar_stacks_mode', JSON.stringify({ enabled: arUseStacks, stacks: arStacksCount }));
	localStorage.setItem('ar_number_select', String(arSelectedNumber));
	setCookie('ar_stacks_mode', JSON.stringify({ enabled: arUseStacks, stacks: arStacksCount }), 365);
	setCookie('ar_number_select', String(arSelectedNumber), 365);
}
function focusCameraOnNumber() {
	if (arSelectedNumber === 0) {
		camera.position.set(4.095000000000001, 2.566, 20.605);
		controls.target.set(4.281000000000001, 17.126, 4.1129999999999995);
	} else if (arSelectedNumber === 2) {
		camera.position.set(3.795, 2.566, 18.105);
		controls.target.set(4, 15.3, 0);
	} else {
		camera.position.set(cameraHomePos.x, cameraHomePos.y, cameraHomePos.z);
		controls.target.set(cameraHomeTarget.x, cameraHomeTarget.y, cameraHomeTarget.z);
	}
	console.log('camera position', camera.position.x, camera.position.y, camera.position.z);
	console.log('camera target', controls.target.x, controls.target.y, controls.target.z);
}
loadArSettings();
document.getElementById('ar-use-stacks').addEventListener('change', updateStacksUI);
document.getElementById('arCameraResetBtn').addEventListener('click', function () {
	focusCameraOnNumber();
});
document.getElementById('arSettingsBtn').addEventListener('click', function () {
	loadArSettings();
	document.getElementById('ar-settings-overlay').classList.add('is-open');
});
document.getElementById('arSettingsClose').addEventListener('click', function () {
	document.getElementById('ar-settings-overlay').classList.remove('is-open');
});
document.getElementById('arSettingsSave').addEventListener('click', function () {
	saveArSettings();
	document.getElementById('ar-settings-overlay').classList.remove('is-open');
	focusCameraOnNumber();
	doSpawn();
});
document.getElementById('ar-settings-overlay').addEventListener('click', function (e) {
	if (e.target === this) this.classList.remove('is-open');
});

function animate() {
	requestAnimationFrame(animate);
	controls.update();
	renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function () {
	containerW = canvas.parentElement.clientWidth || 640;
	containerH = canvas.parentElement.clientHeight || Math.min(480, Math.floor(containerW * 0.75));
	if (containerW < 100) containerW = 640;
	if (containerH < 100) containerH = 360;
	w = containerW;
	h = containerH;
	camera.aspect = w / h;
	camera.updateProjectionMatrix();
	renderer.setSize(w, h);
});
