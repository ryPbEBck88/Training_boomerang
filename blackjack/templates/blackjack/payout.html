{% extends "base.html" %}
{% block content %}

<form method="post" autocomplete="off" class="payout-form">
    {% csrf_token %}
    <div class="payout-params">
        <label>min: <input type="number" name="min_bet" value="{{ min_bet }}" min="1" max="10000"></label>
        <label>max: <input type="number" name="max_bet" value="{{ max_bet }}" min="1" max="10000"></label>
        <label>step: <input type="number" name="step" value="{{ step }}" min="1" max="1000"></label>
    </div>

    <div class="payout-bet">{{ bet }}</div>

    <input type="number" name="user_payout" class="payout-input" placeholder="Введите выплату" step="0.01" {% if success or skipped %}disabled{% endif %}>

    <div class="payout-buttons">
        {% if success or skipped %}
            <button type="submit" name="action" value="next" class="btn btn-primary">Дальше</button>
        {% else %}
            <button type="submit" name="action" value="check" class="btn btn-primary">Проверить</button>
        {% endif %}
        <button type="submit" name="action" value="skip" formnovalidate class="btn btn-secondary" {% if success or skipped %}disabled{% endif %}>Пропустить</button>
    </div>

    {% if message %}
        <div class="payout-message {% if success %}success{% else %}error{% endif %}">{{ message }}</div>
    {% endif %}

    {% if success or skipped %}
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const nextBtn = document.querySelector('button[name="action"][value="next"]');
        const input = document.querySelector('input[name="user_payout"]');
        if(nextBtn) {
            nextBtn.focus();
        }
        // Ловим Enter на форме (на всём документе — если input заблокирован, игнорируем)
        document.querySelector('form').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                // Если кнопка "Дальше" видима и не disabled
                if(nextBtn && !nextBtn.disabled) {
                    e.preventDefault();
                    nextBtn.click();
                }
            }
        });
    });
    </script>
    {% endif %}
    
</form>

{% endblock %}
